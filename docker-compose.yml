version: '3.8'
services:
  db:
    image: pgvector/pgvector:pg15
    restart: always
    environment:
      POSTGRES_USER: zalouser
      POSTGRES_PASSWORD: zalopassword
      POSTGRES_DB: zalo_saas
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
